<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gasolina — Device Secret QR</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    h2 { margin-bottom: 24px; color: #333; }
    input {
      width: 360px;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }
    input:focus { border-color: #1976d2; }
    #qr {
      margin-top: 32px;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      display: none;
    }
    #hint {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <h2>Device Secret → QR Code</h2>
  <input id="secret" type="text" placeholder="Paste device secret here…" autofocus />
  <div id="qr"><canvas id="canvas"></canvas></div>
  <p id="hint"></p>

  <script>
    const input  = document.getElementById('secret');
    const qrBox  = document.getElementById('qr');
    const canvas = document.getElementById('canvas');
    const hint   = document.getElementById('hint');

    function render(value) {
      if (!value) { qrBox.style.display = 'none'; hint.textContent = ''; return; }
      QRCode.toCanvas(canvas, value, { width: 300, margin: 2 }, function (err) {
        if (err) { hint.textContent = 'Error: ' + err.message; return; }
        qrBox.style.display = 'block';
        hint.textContent = value;
      });
    }

    input.addEventListener('input', () => render(input.value.trim()));
  </script>
</body>
</html>
